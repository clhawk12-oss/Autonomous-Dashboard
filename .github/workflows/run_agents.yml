name: Run Portfolio Agents

on:
  schedule:
    - cron: '0 21 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: portfolio-agents
  cancel-in-progress: true

jobs:
  swing:
    name: Swing Agent
    runs-on: ubuntu-latest
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Verify API key is set
        run: |
          if [ -z "$ANTHROPIC_API_KEY" ]; then
            echo "ERROR: ANTHROPIC_API_KEY secret is empty or not set"
            exit 1
          fi
          echo "API key is set (length: ${#ANTHROPIC_API_KEY})"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic yfinance pandas numpy pytz python-dotenv

      - name: Write .env
        run: printf 'ANTHROPIC_API_KEY=%s\n' "$ANTHROPIC_API_KEY" > .env

      - name: Run swing agent
        run: python main.py --agent swing --force

      - name: Commit updated state
        run: |
          set -e
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add swing/holdings.json swing/memory.json swing/trade_log.md swing/summary.md swing/equity_log.jsonl
          git diff --staged --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore: swing agent run ${{ github.run_id }}"
          for attempt in 1 2 3; do
            git fetch origin main
            git checkout -- .
            git rebase origin/main
            git push origin main && break
            echo "Push attempt $attempt failed, retrying..."
            sleep 3
          done

  long_term:
    name: Long-Term Agent
    needs: swing
    if: always() && (needs.swing.result == 'success' || needs.swing.result == 'skipped')
    runs-on: ubuntu-latest
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Verify API key is set
        run: |
          if [ -z "$ANTHROPIC_API_KEY" ]; then
            echo "ERROR: ANTHROPIC_API_KEY secret is empty or not set"
            exit 1
          fi
          echo "API key is set (length: ${#ANTHROPIC_API_KEY})"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic yfinance pandas numpy pytz python-dotenv

      - name: Write .env
        run: printf 'ANTHROPIC_API_KEY=%s\n' "$ANTHROPIC_API_KEY" > .env

      - name: Run long-term agent
        run: python main.py --agent long_term --force

      - name: Commit updated state
        run: |
          set -e
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add long_term/holdings.json long_term/memory.json long_term/trade_log.md long_term/summary.md long_term/equity_log.jsonl
          git diff --staged --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore: long-term agent run ${{ github.run_id }}"
          for attempt in 1 2 3; do
            git fetch origin main
            git checkout -- .
            git rebase origin/main
            git push origin main && break
            echo "Push attempt $attempt failed, retrying..."
            sleep 3
          done

  notify:
    name: Send Digest Email
    needs: long_term
    if: always() && (needs.long_term.result == 'success' || needs.long_term.result == 'skipped')
    runs-on: ubuntu-latest
    env:
      GMAIL_ADDRESS:      ${{ secrets.GMAIL_ADDRESS }}
      GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
      NOTIFY_TO_EMAIL:    ${{ secrets.NOTIFY_TO_EMAIL }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pytz

      - name: Send digest email
        run: python notify.py
