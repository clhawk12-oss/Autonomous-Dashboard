name: Run Portfolio Agents

on:
  schedule:
    - cron: '30 20 * * 1-5'
    - cron: '15 21 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  swing:
    name: Swing Agent
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '30 20 * * 1-5'
    runs-on: ubuntu-latest
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Verify API key is set
        run: |
          if [ -z "$ANTHROPIC_API_KEY" ]; then
            echo "ERROR: ANTHROPIC_API_KEY secret is empty or not set"
            exit 1
          fi
          echo "API key is set (length: ${#ANTHROPIC_API_KEY})"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic yfinance pandas numpy pytz python-dotenv

      - name: Write .env
        run: printf 'ANTHROPIC_API_KEY=%s\n' "$ANTHROPIC_API_KEY" > .env

      - name: Run swing agent
        run: python main.py --agent swing --force

      - name: Commit updated state
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: swing agent run ${{ github.run_id }}"
          file_pattern: "swing/holdings.json swing/memory.json swing/trade_log.md swing/summary.md swing/equity_log.jsonl"

  long_term:
    name: Long-Term Agent
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '15 21 * * 1-5'
    needs: swing
    runs-on: ubuntu-latest
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Verify API key is set
        run: |
          if [ -z "$ANTHROPIC_API_KEY" ]; then
            echo "ERROR: ANTHROPIC_API_KEY secret is empty or not set"
            exit 1
          fi
          echo "API key is set (length: ${#ANTHROPIC_API_KEY})"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic yfinance pandas numpy pytz python-dotenv

      - name: Write .env
        run: printf 'ANTHROPIC_API_KEY=%s\n' "$ANTHROPIC_API_KEY" > .env

      - name: Run long-term agent
        run: python main.py --agent long_term --force

      - name: Commit updated state
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: long-term agent run ${{ github.run_id }}"
          file_pattern: "long_term/holdings.json long_term/memory.json long_term/trade_log.md long_term/summary.md long_term/equity_log.jsonl"
